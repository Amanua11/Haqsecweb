<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blessing Collection | Boutique & Concierge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">BLESSING COLLECTION</div>
        <ul class="nav-links">
            <li><a href="#shop">Shop</a></li>
            <li><a href="#order">Custom Order</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Elevated Style, Curated for You</h1>
        <p>Premium Turkish imports and local Ethiopian designs.</p>
    </header>

    <main>
        <section id="shop">
            <h2>Collection</h2>
            <div class="grid" id="product-grid"></div>
        </section>

        <section id="order" class="order-section">
            <h2>Place a Custom Order</h2>
            <form id="order-form">
                <input type="text" placeholder="Your Name" required>
                <input type="text" placeholder="Item Name / Special Request" required>
                <button type="submit" class="contact-btn">Send Inquiry to 0944268337</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Visit us: <a href="https://maps.app.goo.gl/PzgyaJUZbwHeeqfp9" target="_blank">Yeka View Apartment, Addis Ababa</a></p>
        <p>Contact: 0944268337</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
